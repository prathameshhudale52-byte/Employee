{% extends 'base.html' %}

{% block title %}Add Role | CORP-OS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <div class="d-flex align-items-center">
                    <div class="bg-success bg-opacity-10 text-success rounded p-2 me-3">
                        <i class="bi bi-shield-plus h4 mb-0"></i>
                    </div>
                    <h4 class="fw-bold mb-0">New System Role</h4>
                </div>
            </div>

            <div class="card-body p-4">
                <p class="text-muted small mb-4">Define a new job title and set of permissions for the system.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="django-form-container">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success py-2 fw-bold">
                            Create Role
                        </button>
                        <a href="{% url 'roleList' %}" class="btn btn-link text-muted mt-2 text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i> Back to List
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
