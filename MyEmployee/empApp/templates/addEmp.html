{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4">
            <h3 class="fw-bold mb-4">Staff Registration</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="django-form-container">
                    {{ form.as_p }}
                </div>
                <hr class="my-4">
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Save Record</button>
                <a href="{% url 'empList' %}" class="btn btn-link w-100 text-muted mt-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
