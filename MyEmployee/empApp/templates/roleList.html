{% extends 'base.html' %}

{% block title %}System Roles{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2 class="fw-bold">User Roles</h2>
    <a href="{% url 'addRole' %}" class="btn btn-dark">Add New</a>
</div>

<div class="row g-4">
    {% for role in roles %}
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4">
            <div class="d-flex align-items-center mb-3">
                <div class="bg-success bg-opacity-10 text-success rounded p-2 me-3">
                    <i class="bi bi-shield-check"></i>
                </div>
                <h5 class="fw-bold mb-0">{{ role.rname }}</h5>
            </div>
            <p class="text-muted small">{{ role.description|default:"Standard organizational role permissions." }}</p>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
